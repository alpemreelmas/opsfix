version: "1"

policy_file: "policy.yaml"

audit:
  enabled: true
  file_path: "/var/log/opsfix/audit.jsonl"

ssh:
  idle_timeout: "5m"
  connect_timeout: "10s"
  # known_hosts_file: "/home/deploy/.ssh/known_hosts"  # uncomment for production

servers:
  - name: web-01
    host: "10.0.1.10"
    port: 22
    user: "deploy"
    key_path: "/home/deploy/.ssh/opsfix_ed25519"
    tags: ["web", "production"]

  - name: worker-01
    host: "10.0.1.11"
    port: 22
    user: "deploy"
    key_path: "/home/deploy/.ssh/opsfix_ed25519"
    tags: ["worker", "production"]

  - name: db-01
    host: "10.0.1.12"
    port: 22
    user: "deploy"
    key_path: "/home/deploy/.ssh/opsfix_ed25519"
    tags: ["database", "production"]
